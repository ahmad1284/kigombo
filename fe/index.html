<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrel Banking</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>
    <div id="app">Loading...</div>

    <template id="login">
        <section class="login-page">
            <div class="login-container">
                <div class="login-title text-center">
                    <span class="hide-xs">Squirrel</span>
                    <img class="login-logo" src="logo.svg" alt="Squirrel Banking Logo">
                    <span class="hide-xs">Banking</span>
                </div>
                <div class="login-content">
                    <h2 class="text-center">Login</h2>
                    <form id="loginForm" action="javascript:login()">
                        <label for="loginUser">Username</label>
                        <input id="loginUser" name="user" type="text" maxlength="20" required>
                        <label for="loginPassword">Password</label>
                        <input id="loginPassword" name="password" type="password" maxlength="100" required>
                        <div id="loginError" class="error" role="alert"></div>
                        <button>Login</button>
                    </form>
                    <p class="login-separator text-center"><span>OR</span></p>
                    <h2 class="text-center">Register</h2>
                    <form id="registerForm" action="javascript:register()">
                        <label for="regUser">Username (required)</label>
                        <input id="regUser" name="user" type="text" maxlength="20" required>
                        <label for="regPassword">Password (required)</label>
                        <input id="regPassword" name="password" type="password" maxlength="100" required>
                        <label for="regCurrency">Currency (required)</label>
                        <input id="regCurrency" name="currency" type="text" maxlength="5" value="$" required>
                        <label for="regDescription">Description</label>
                        <input id="regDescription" name="description" type="text" maxlength="100">
                        <label for="regBalance">Current balance</label>
                        <input id="regBalance" name="balance" type="number" value="0">
                        <div id="registerError" class="error" role="alert"></div>
                        <button>Register</button>
                    </form>
                </div>
            </div>
        </section>
    </template>

    <template id="dashboard">
        <section class="dashboard-page">
            <header class="dashboard-header">
                <img class="dashboard-logo" src="logo.svg" alt="Squirrel Banking Logo">
                <h1 class="dashboard-title hide-xs">Squirrel Banking</h1>
                <button onclick="logout()">Logout</button>
            </header>
            <div class="balance">
                <div>Balance</div>
                <span id="currency"></span>
                <span> ~ </span>
                <span id="balance"></span>
            </div>
            <div class="dashboard-content">
                <div class="transactions-title">
                    <h2 id="description"></h2>
                    <button onclick="addTransaction()">Add transaction</button>
                </div>
                <table class="transactions-table" aria-label="Transactions">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Object</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactions"></tbody>
                </table>
            </div>
        </section>
        <section id="transactionDialog" class="dialog">
            <div class="dialog-content">
                <h2 class="text-center">Add transaction</h2>
                <form id="transactionForm" action="javascript:void(0)">
                    <label for="date">Date</label>
                    <input id="date" name="date" type="date" required>
                    <label for="object">Object</label>
                    <input id="object" name="object" type="text" maxlength="50" required>
                    <label for="amount">Amount (use negative value for debit)</label>
                    <input id="amount" name="amount" type="number" value="0" step="any" required>
                    <div id="transactionError" class="error" role="alert"></div>
                    <div class="dialog-buttons">
                        <button type="button" class="button-alt" onclick="cancelTransaction()"
                            formnovalidate>Cancel</button>
                        <button formaction="javascript:confirmTransaction()">OK</button>
                    </div>
                </form>
            </div>
        </section>
    </template>

    <template id="transaction">
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </template>
</body>

</html>
